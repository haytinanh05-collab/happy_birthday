<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popup Thiệp Tình Yêu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="backdrop">
    <div class="modal">
      <button class="close" onclick="window.close()">×</button>
      <div class="envelope-top"></div>
      <div class="content">
        <div class="frame">
          <div class="illustration" aria-hidden="true">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M32 6 L44 24 H20 L32 6 Z" fill="#f8bbd0" stroke="#d81b60" stroke-width="2"/>
              <path d="M18 24 H46 L42 52 H22 L18 24 Z" fill="#ffe4ec" stroke="#d81b60" stroke-width="2"/>
              <path d="M32 18 L34 12 L36 18" stroke="#d81b60" stroke-width="3"/>
              <path d="M26 36 Q32 28 38 36" stroke="#d81b60" stroke-width="2" fill="none" />
            </svg>
          </div>
          <div class="text-block">
            <h2>Gửi Anh yêu!</h2>
            <p>Em chúc anh mỗi ngày luôn vững tin và tràn đầy <span class="heart">❤</span><br />
              Niềm vui và hạnh phúc sẽ luôn ở bên anh <span class="heart">❤</span><br />
              Mỗi bước ta đi là một hành trình ân cần <span class="heart">❤</span>
            </p>
            <div class="line"></div>
          </div>
        </div>
        <div class="bottom-deco">
          <div class="cat"></div>
          <div class="cat"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
